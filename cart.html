<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopDaily — Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand fw-black" href="index.html">SHOP<span class="brand-accent">Daily</span></a>
        <div class="ms-auto d-flex gap-2 align-items-center">
            <a href="index.html" class="btn btn-outline-dark btn-sm rounded-pill px-3">
                <i class="bi bi-arrow-left me-1"></i> Continue Shopping
            </a>
        </div>
    </div>
</nav>

<!-- Cart Content -->
<div class="container py-5">
    <div class="mb-4">
        <h3 class="fw-black mb-0">Shopping Cart</h3>
        <p class="text-muted small" id="cart-item-count">0 items in your cart</p>
    </div>

    <div class="row g-4">
        <!-- Cart Items -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold mb-0">Cart Items</h6>
                    <button class="btn btn-sm btn-outline-danger rounded-pill px-3" onclick="clearCart()">
                        <i class="bi bi-trash me-1"></i> Clear All
                    </button>
                </div>
                <div id="cart-items">
                    <!-- filled by JS -->
                </div>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm rounded-4 p-4 sticky-top" style="top:80px">
                <h6 class="fw-bold mb-3">Order Summary</h6>
                <div class="d-flex justify-content-between mb-2 small">
                    <span class="text-muted">Subtotal (<span id="sum-count">0</span> items)</span>
                    <span class="fw-semibold" id="sum-subtotal">$0.00</span>
                </div>
                <div class="d-flex justify-content-between mb-2 small">
                    <span class="text-muted">Shipping</span>
                    <span class="text-success fw-semibold">Free</span>
                </div>
                <div class="d-flex justify-content-between mb-3 small">
                    <span class="text-muted">Tax (8%)</span>
                    <span class="fw-semibold" id="sum-tax">$0.00</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-4">
                    <span class="fw-black fs-5">Total</span>
                    <span class="fw-black fs-5" id="sum-total" style="color:#f5a623">$0.00</span>
                </div>
                <button class="btn btn-warning w-100 rounded-pill fw-bold py-2 text-white" id="checkout-btn"
                        onclick="proceedCheckout()">
                    <i class="bi bi-credit-card me-2"></i> Proceed to Checkout
                </button>
                <div class="mt-3">
                    <div class="small text-muted d-flex align-items-center gap-2 mb-2">
                        <i class="bi bi-shield-check text-success"></i> Secure SSL checkout
                    </div>
                    <div class="small text-muted d-flex align-items-center gap-2 mb-2">
                        <i class="bi bi-arrow-return-left text-primary"></i> Free returns within 30 days
                    </div>
                    <div class="small text-muted d-flex align-items-center gap-2">
                        <i class="bi bi-headset text-warning"></i> 24/7 customer support
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer style="background:#1a1a2e;padding:1.5rem 0;margin-top:3rem">
    <div class="container text-center" style="font-size:.82rem;color:#555">
        © 2026 ShopDaily™. All Rights Reserved.
    </div>
</footer>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:999">
    <div id="toast" class="toast align-items-center text-white border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toast-msg"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
